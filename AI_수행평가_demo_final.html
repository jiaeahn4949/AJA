<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수행평가 AI 연습</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F6F4EF;
  --surface: #FFFFFF;
  --surface2: #F0EDE6;
  --border: #E2DDD4;
  --border2: #C9C2B5;
  --text: #1C1A17;
  --text2: #6A6560;
  --text3: #9E9890;
  --accent: #2B5CE6;
  --accent-l: #EEF2FF;
  --accent-b: #C5D0FA;
  --green: #2D9E44;
  --green-l: #EBFBEE;
  --green-b: #B2F2BB;
  --amber: #D97706;
  --amber-l: #FFFBEB;
  --amber-b: #FCD34D;
  --coral: #C92A2A;
  --coral-l: #FFF5F5;
  --coral-b: #FFC9C9;
  --purple: #6D28D9;
  --purple-l: #F5F3FF;
  --purple-b: #DDD6FE;
  --teal: #0D9488;
  --teal-l: #F0FDFA;
  --teal-b: #99F6E4;
  --r: 12px;
  --r-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── NAV ── */
.nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; position: sticky; top: 0; z-index: 200;
}
.nav-brand { display: flex; align-items: center; gap: 10px; }
.nav-logo { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 5px; letter-spacing: .05em; }
.nav-title { font-size: 14px; font-weight: 500; }
.nav-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

/* ── API BANNER ── */
.api-banner {
  background: var(--amber-l); border-bottom: 1px solid var(--amber-b);
  padding: 9px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.api-banner span { font-size: 13px; color: #78350F; }
.api-banner input {
  flex: 1; min-width: 200px; max-width: 360px;
  padding: 5px 11px; border: 1px solid var(--amber-b); border-radius: 7px;
  font-size: 13px; font-family: 'DM Mono', monospace; background: #FFFDF5; color: var(--text);
}
.api-banner button { padding: 5px 14px; background: var(--accent); color: #fff; border: none; border-radius: 7px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
.api-banner a { font-size: 12px; color: var(--accent); text-decoration: none; }

/* ── LAYOUT ── */
.layout { display: grid; grid-template-columns: 260px 1fr; gap: 0; min-height: calc(100vh - 52px); }

/* ── SIDEBAR ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 12px;
  display: flex; flex-direction: column; gap: 12px;
  position: sticky; top: 52px; height: calc(100vh - 52px); overflow-y: auto;
}
.sidebar-section-label {
  font-size: 10px; font-weight: 700; letter-spacing: .08em;
  color: var(--text3); text-transform: uppercase;
  padding: 0 6px; margin-bottom: 4px;
}

/* Subject tabs */
.subject-tabs { display: flex; gap: 4px; flex-wrap: wrap; padding: 0 2px; }
.subj-btn {
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--border2); font-size: 12px;
  cursor: pointer; background: var(--surface); color: var(--text2);
  transition: all .15s; font-family: 'Noto Sans KR', sans-serif;
}
.subj-btn.active { background: var(--accent-l); color: var(--accent); border-color: var(--accent-b); font-weight: 500; }
.subj-btn.disabled { opacity: .4; cursor: default; }

/* Grade + unit tree */
.tree { display: flex; flex-direction: column; gap: 2px; }
.tree-grade {
  padding: 7px 8px; font-size: 12px; font-weight: 500;
  color: var(--text2); display: flex; align-items: center; gap: 6px;
  cursor: pointer; border-radius: var(--r-sm); transition: background .1s;
  user-select: none;
}
.tree-grade:hover { background: var(--surface2); }
.tree-grade .arrow { font-size: 10px; transition: transform .15s; }
.tree-grade.open .arrow { transform: rotate(90deg); }
.tree-units { padding-left: 18px; display: none; flex-direction: column; gap: 1px; }
.tree-grade.open + .tree-units { display: flex; }
.unit-btn {
  padding: 7px 10px; border-radius: var(--r-sm);
  font-size: 13px; cursor: pointer; background: transparent;
  color: var(--text2); border: none; text-align: left;
  font-family: 'Noto Sans KR', sans-serif; transition: all .15s;
  display: flex; flex-direction: column; gap: 2px;
}
.unit-btn:hover { background: var(--surface2); color: var(--text); }
.unit-btn.active { background: var(--accent-l); color: var(--accent); }
.unit-btn .unit-sub { font-size: 11px; color: var(--text3); }
.unit-btn.active .unit-sub { color: var(--accent-b); }

/* Rubric in sidebar */
.rubric-box { border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden; }
.rubric-box table { width: 100%; border-collapse: collapse; font-size: 11px; }
.rubric-box td { padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: top; color: var(--text2); line-height: 1.5; }
.rubric-box tr:last-child td { border-bottom: none; }
.rubric-box td:first-child { width: 66px; }
.lv { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; }
.lv-a { background: var(--green-l); color: var(--green); border: 1px solid var(--green-b); }
.lv-b { background: var(--accent-l); color: var(--accent); border: 1px solid var(--accent-b); }
.lv-c { background: var(--amber-l); color: var(--amber); border: 1px solid var(--amber-b); }
.lv-d { background: var(--coral-l); color: var(--coral); border: 1px solid var(--coral-b); }

/* Coming soon badge */
.soon { display: inline-block; font-size: 10px; padding: 1px 6px; background: var(--surface2); color: var(--text3); border-radius: 4px; margin-left: 4px; }

/* ── MAIN ── */
.main { padding: 24px 24px; display: flex; flex-direction: column; gap: 16px; max-width: 760px; }

/* Problem card */
.problem-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 18px 20px;
}
.problem-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.act-tag { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 5px; letter-spacing: .04em; }
.tag-blue { background: var(--accent-l); color: var(--accent); border: 1px solid var(--accent-b); }
.tag-purple { background: var(--purple-l); color: var(--purple); border: 1px solid var(--purple-b); }
.tag-teal { background: var(--teal-l); color: var(--teal); border: 1px solid var(--teal-b); }
.tag-green { background: var(--green-l); color: var(--green); border: 1px solid var(--green-b); }
.problem-title { font-size: 14px; font-weight: 500; }
.problem-body {
  background: var(--surface2); border-radius: var(--r-sm);
  padding: 13px 15px; font-size: 14px; line-height: 1.8;
  border-left: 3px solid var(--accent);
}
.hl { display: inline; background: var(--accent-l); color: var(--accent); padding: 1px 6px; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
.hl-g { background: var(--green-l); color: var(--green); padding: 1px 6px; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
.problem-meta { font-size: 11px; color: var(--text3); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

/* Activity tabs */
.act-tabs { display: flex; gap: 6px; }
.act-tab {
  flex: 1; padding: 9px 12px; border: 1px solid var(--border2); border-radius: var(--r-sm);
  font-size: 12px; font-weight: 500; cursor: pointer; background: var(--surface);
  color: var(--text2); text-align: center; line-height: 1.4; transition: all .15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.act-tab.active { background: var(--accent-l); color: var(--accent); border-color: var(--accent-b); }
.act-tab .tab-sub { font-weight: 400; font-size: 11px; color: var(--text3); margin-top: 1px; }
.act-tab.active .tab-sub { color: var(--accent-b); }

/* Steps */
.steps-row { display: flex; align-items: center; gap: 4px; font-size: 11px; }
.step-node { display: flex; align-items: center; gap: 4px; }
.step-dot { width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--border2); background: var(--surface); color: var(--text3); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.step-dot.cur { background: var(--accent); color: #fff; border-color: var(--accent); }
.step-dot.done { background: var(--green); color: #fff; border-color: var(--green); }
.step-lbl { font-size: 11px; color: var(--text3); }
.step-lbl.cur { color: var(--text); font-weight: 500; }
.step-line { flex: 1; height: 0.5px; background: var(--border2); min-width: 12px; }

/* Chat */
.chat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.chat-header { padding: 11px 18px; border-bottom: 1px solid var(--border); background: var(--surface2); display: flex; align-items: center; gap: 8px; }
.chat-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
.chat-hdr-txt { font-size: 13px; font-weight: 500; color: var(--text2); }
.chat-body { padding: 18px; display: flex; flex-direction: column; gap: 10px; min-height: 160px; max-height: 400px; overflow-y: auto; }
.chat-body::-webkit-scrollbar { width: 3px; }
.chat-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.bbl { padding: 11px 14px; border-radius: 14px; font-size: 14px; line-height: 1.65; max-width: 90%; animation: bIn .2s ease; }
@keyframes bIn { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform: translateY(0); } }
.bbl-lbl { font-size: 10px; font-weight: 700; letter-spacing: .04em; margin-bottom: 4px; text-transform: uppercase; }
.bbl.ai { background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; align-self: flex-start; color: var(--text); }
.bbl.ai .bbl-lbl { color: var(--text3); }
.bbl.user { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; }
.bbl.fb { background: var(--green-l); border: 1px solid var(--green-b); border-bottom-left-radius: 4px; align-self: flex-start; color: #153A1F; }
.bbl.fb .bbl-lbl { color: var(--green); }
.bbl.peer { background: var(--amber-l); border: 1px solid var(--amber-b); border-bottom-left-radius: 4px; align-self: flex-start; color: #44260A; }
.bbl.peer .bbl-lbl { color: var(--amber); }

.typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; border-bottom-left-radius: 4px; align-self: flex-start; }
.tdot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: td 1.2s infinite; }
.tdot:nth-child(2) { animation-delay: .2s; }
.tdot:nth-child(3) { animation-delay: .4s; }
@keyframes td { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-4px);opacity:1} }

/* TTS button */
.tts-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border: 1px solid var(--border2); border-radius: 20px;
  font-size: 11px; cursor: pointer; background: var(--surface);
  color: var(--text3); margin-top: 6px; font-family: 'Noto Sans KR', sans-serif;
  transition: all .15s;
}
.tts-btn:hover { background: var(--surface2); color: var(--text2); }
.tts-btn.speaking { color: var(--accent); border-color: var(--accent-b); background: var(--accent-l); }

/* Input */
.input-area { padding: 14px 18px; border-top: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; gap: 8px; }
.input-row { display: flex; gap: 7px; align-items: flex-end; }
.input-row textarea {
  flex: 1; padding: 9px 13px; border: 1px solid var(--border2); border-radius: 10px;
  font-size: 14px; font-family: 'Noto Sans KR', sans-serif; resize: none;
  min-height: 58px; color: var(--text); background: var(--surface); line-height: 1.5;
  transition: border-color .15s;
}
.input-row textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(43,92,230,.07); }
.input-row textarea::placeholder { color: var(--text3); }

.mic-btn {
  width: 52px; height: 58px; border: 1px solid var(--border2); border-radius: 10px;
  background: var(--surface); font-size: 18px; cursor: pointer; flex-shrink: 0;
  transition: all .15s; display: flex; align-items: center; justify-content: center;
}
.mic-btn:hover { background: var(--surface2); }
.mic-btn.rec { background: var(--coral-l); border-color: var(--coral-b); animation: pulse .9s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(201,42,42,.15)} 50%{box-shadow:0 0 0 6px rgba(201,42,42,0)} }

.send-btn {
  height: 58px; padding: 0 18px; background: var(--accent); color: #fff;
  border: none; border-radius: 10px; font-size: 14px; font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; white-space: nowrap;
  transition: all .15s;
}
.send-btn:hover { background: #2348CC; }
.send-btn:disabled { background: var(--border2); cursor: default; }

.voice-status { font-size: 12px; color: var(--coral); min-height: 18px; font-style: italic; }

.pills { display: flex; gap: 5px; flex-wrap: wrap; }
.pill {
  padding: 5px 11px; border: 1px solid var(--border2); border-radius: 20px;
  font-size: 12px; cursor: pointer; background: var(--surface); color: var(--text2);
  transition: all .15s; font-family: 'Noto Sans KR', sans-serif;
}
.pill:hover { background: var(--accent-l); color: var(--accent); border-color: var(--accent-b); }

/* Section toggles */
.act-section { display: none; flex-direction: column; gap: 14px; }
.act-section.on { display: flex; }
.unit-panel { display: none; flex-direction: column; gap: 16px; }
.unit-panel.on { display: flex; }

/* Welcome */
.welcome {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
  padding: 40px 32px; text-align: center;
}
.welcome h3 { font-size: 18px; font-weight: 500; margin-bottom: 10px; }
.welcome p { font-size: 14px; color: var(--text2); line-height: 1.7; }

@media (max-width: 680px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .main { padding: 16px; }
}

/* ── PHASE TABS (탐구대화 / 답안작성 / 루브릭피드백) ── */
.phase-tabs {
  display: flex; gap: 0; border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden; background: var(--surface2);
}
.phase-tab {
  flex: 1; padding: 10px 8px; font-size: 12px; font-weight: 500;
  cursor: pointer; background: transparent; color: var(--text3);
  border: none; border-right: 1px solid var(--border);
  font-family: 'Noto Sans KR', sans-serif; transition: all .15s;
  text-align: center; line-height: 1.4; display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.phase-tab:last-child { border-right: none; }
.phase-tab.active { background: var(--surface); color: var(--accent); font-weight: 700; }
.phase-tab.done { color: var(--green); }
.phase-tab .phase-num {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border2);
  font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center;
  color: var(--text3);
}
.phase-tab.active .phase-num { background: var(--accent); color: #fff; border-color: var(--accent); }
.phase-tab.done .phase-num { background: var(--green); color: #fff; border-color: var(--green); }
.phase-panel { display: none; flex-direction: column; gap: 14px; }
.phase-panel.on { display: flex; }

/* ── ANSWER EDITOR ── */
.editor-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
}
.editor-header {
  padding: 12px 18px; background: var(--surface2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.editor-header-left { display: flex; align-items: center; gap: 8px; }
.editor-title { font-size: 13px; font-weight: 600; color: var(--text); }
.editor-hint { font-size: 11px; color: var(--text3); }
.editor-body { padding: 0; }
.answer-textarea {
  width: 100%; min-height: 200px; padding: 18px;
  border: none; outline: none; resize: vertical;
  font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
  line-height: 1.9; color: var(--text); background: var(--surface);
}
.answer-textarea::placeholder { color: var(--text3); }
.editor-footer {
  padding: 12px 18px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  background: var(--surface2);
}
.char-count { font-size: 11px; color: var(--text3); }
.submit-btn {
  padding: 9px 24px; background: var(--accent); color: #fff;
  border: none; border-radius: var(--r-sm); font-size: 14px; font-weight: 600;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all .15s;
}
.submit-btn:hover { background: #2348CC; transform: translateY(-1px); }
.hint-toggle {
  padding: 6px 14px; background: transparent; color: var(--text2);
  border: 1px solid var(--border2); border-radius: var(--r-sm);
  font-size: 12px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
}

/* ── FEEDBACK PANEL ── */
.feedback-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
}
.feedback-header {
  padding: 14px 20px; background: var(--surface2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.grade-badge {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900; flex-shrink: 0;
}
.grade-A { background: var(--green-l); color: var(--green); border: 2px solid var(--green-b); }
.grade-B { background: var(--accent-l); color: var(--accent); border: 2px solid var(--accent-b); }
.grade-C { background: var(--amber-l); color: var(--amber); border: 2px solid var(--amber-b); }
.grade-D { background: var(--coral-l); color: var(--coral); border: 2px solid var(--coral-b); }
.grade-E { background: var(--surface2); color: var(--text3); border: 2px solid var(--border2); }
.grade-info h4 { font-size: 15px; font-weight: 700; color: var(--text); }
.grade-info p { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* 3영역 피드백 */
.fb-sections { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.fb-section {
  border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden;
}
.fb-section-header {
  padding: 9px 14px; display: flex; align-items: center; gap: 8px;
  background: var(--surface2);
}
.fb-section-icon { font-size: 14px; }
.fb-section-title { font-size: 12px; font-weight: 700; color: var(--text2); }
.fb-section-score {
  margin-left: auto; font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 10px;
}
.score-good { background: var(--green-l); color: var(--green); }
.score-mid { background: var(--amber-l); color: var(--amber); }
.score-low { background: var(--coral-l); color: var(--coral); }
.fb-section-body { padding: 11px 14px; font-size: 13px; color: var(--text2); line-height: 1.7; }
.fb-next { 
  margin-top: 8px; padding: 8px 12px;
  background: var(--accent-l); border-radius: var(--r-sm);
  font-size: 12px; color: var(--accent); font-weight: 500;
  border-left: 3px solid var(--accent);
}

/* ── 등급별 예시 답안 비교 ── */
.example-section { padding: 0 20px 20px; }
.example-title {
  font-size: 12px; font-weight: 700; color: var(--text3);
  letter-spacing: .06em; text-transform: uppercase;
  padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 14px;
}
.grade-ladder { display: flex; flex-direction: column; gap: 8px; }
.grade-row {
  border: 1px solid var(--border); border-radius: var(--r-sm);
  overflow: hidden; cursor: pointer; transition: all .15s;
}
.grade-row:hover { border-color: var(--border2); }
.grade-row.current { border-color: var(--amber-b); box-shadow: 0 0 0 2px var(--amber-l); }
.grade-row.target { border-color: var(--accent-b); box-shadow: 0 0 0 2px var(--accent-l); }
.grade-row-header {
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
  background: var(--surface2);
}
.grade-lbl {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; flex-shrink: 0;
}
.grade-row-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.grade-row-badge {
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 10px; letter-spacing: .03em;
}

function switchPhase(n, key) {
  [1,2,3].forEach(i => {
    const tab = document.getElementById('ptab_' + i + '_' + key);
    const panel = document.getElementById('pp' + i + '_' + key);
    if (tab) tab.classList.toggle('active', i === n);
    if (panel) panel.classList.toggle('on', i === n);
  });
}

function toggleConceptHint(key) {
  const el = document.getElementById('concept-hint_' + key);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function updateCharCount(key) {
  const ta = document.getElementById('ans_' + key);
  const cc = document.getElementById('cc_' + key);
  if (ta && cc) cc.textContent = ta.value.length + '자 작성 중';
}

function submitAnswer(key, uid) {
  const ta = document.getElementById('ans_' + key);
  const ans = ta ? ta.value.trim() : '';
  if (!ans) { alert('답안을 먼저 작성해주세요.'); return; }
  switchPhase(3, key);

  const u = M_UNITS[uid];
  const fb = u.fbTemplate;

async function sendMiddleToAI(key, uid, aid, userMsg) {

async function sendToAI(key, uid, aid, userMsg) {
  if (S.loading) return;
  if (!S.apiKey) {
    addBubble(key, 'ai', '⚠️ 상단 배너에 <b>API 키</b>를 먼저 입력해주세요!');
    return;
  }
  S.loading = true;
  const snd = document.getElementById('snd_' + key);
  if (snd) snd.disabled = true;

  const u = UNITS[uid];
  const a = u.acts.find(x => x.id === aid);
  S.history[key].push({ role: 'user', content: userMsg });
  addBubble(key, 'user', userMsg.replace(/\n/g,'<br>'));
  showTyping(key);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': S.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: a.system,
        messages: S.history[key]
      })
    });
    const data = await res.json();
    const reply = data.content?.map(c => c.text||'').join('') || '응답을 받지 못했어요. 다시 시도해주세요.';
    hideTyping(key);
    const isPeer = userMsg.includes('동료 평가') || userMsg.includes('동료평가');
    const isFb = userMsg.includes('확인해') || userMsg.includes('피드백') || userMsg.includes('맞나요') || userMsg.includes('맞게');
    const bType = isPeer ? 'peer' : isFb ? 'fb' : 'ai';
    addBubble(key, bType, reply.replace(/\n/g,'<br>'));
    S.history[key].push({ role: 'assistant', content: reply });
    // Advance step
    const newStep = Math.min((S.step[key]||1) + 1, a.steps.length);
    S.step[key] = newStep;
    updateSteps(key, newStep, a.steps.length);
  } catch(e) {
    hideTyping(key);
    addBubble(key, 'ai', '연결 오류가 발생했어요. API 키를 확인하거나 잠시 후 다시 시도해주세요.');
  }
  S.loading = false;
  if (snd) snd.disabled = false;
}

function addBubble(key, type, html) {
  const area = document.getElementById('chat_' + key);
  if (!area) return;
  const div = document.createElement('div');
  div.className = 'bbl ' + type;
  const labels = { ai: 'AI 선생님', fb: '✓ 피드백', peer: '👥 동료 평가' };
  if (labels[type]) {
    const ttsId = 'tts_' + Date.now();
    const plain = html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
    div.innerHTML = `<div class="bbl-lbl">${labels[type]}</div>${html}<br><button class="tts-btn" id="${ttsId}" onclick="speakTTS(this,\`${plain.replace(/`/g,"'")}\`)">🔊 읽어주기</button>`;
  } else {
    div.innerHTML = html;
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping(key) {
  const area = document.getElementById('chat_' + key);
  if (!area) return;
  const div = document.createElement('div');
  div.className = 'typing'; div.id = 'tp_' + key;
  div.innerHTML = '<div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>';
  area.appendChild(div); area.scrollTop = area.scrollHeight;
}
function hideTyping(key) {
  const el = document.getElementById('tp_' + key);
  if (el) el.remove();
}

function updateSteps(key, cur, total) {
  for (let i = 1; i <= total; i++) {
    const d = document.getElementById('sd_' + key + '_' + i);
    const l = document.getElementById('sl_' + key + '_' + i);
    if (!d) continue;
    if (i < cur) { d.className = 'step-dot done'; d.textContent = '✓'; if(l) l.className='step-lbl'; }
    else if (i === cur) { d.className = 'step-dot cur'; d.textContent = i; if(l) l.className='step-lbl cur'; }
    else { d.className = 'step-dot'; d.textContent = i; if(l) l.className='step-lbl'; }
  }
}

const VS = { recog: null, activeKey: null };
function toggleMic(key) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const micBtn = document.getElementById('mic_' + key);
  const vst = document.getElementById('vst_' + key);
  if (!SR) { if(vst) vst.textContent = '크롬 브라우저에서 사용해주세요.'; return; }

  if (VS.recog && VS.activeKey === key) { VS.recog.stop(); return; }
  if (VS.recog) VS.recog.stop();

  const rec = new SR();
  rec.lang = 'ko-KR'; rec.continuous = false; rec.interimResults = true;
  VS.recog = rec; VS.activeKey = key;

  rec.onstart = () => { if(micBtn){micBtn.classList.add('rec');micBtn.textContent='⏹';} if(vst) vst.textContent='🔴 듣고 있어요... 말씀하세요'; };
  rec.onresult = (e) => {
    let fin='', int='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      e.results[i].isFinal ? fin+=e.results[i][0].transcript : int+=e.results[i][0].transcript;
    }
    const ta = document.getElementById('inp_' + key);
    if(ta) ta.value = fin||int;
    if(fin && vst) vst.textContent='✓ 인식 완료! 전송 버튼을 누르세요.';
  };
  rec.onerror = (e) => {
    if(vst) vst.textContent = e.error==='not-allowed'?'마이크 권한을 허용해주세요.':'음성 인식 오류';
    if(micBtn){micBtn.classList.remove('rec');micBtn.textContent='🎤';}
  };
  rec.onend = () => { if(micBtn){micBtn.classList.remove('rec');micBtn.textContent='🎤';} VS.recog=null; VS.activeKey=null; };
  rec.start();
}

// ── TTS ──
function speakTTS(btn, text) {
  if (!window.speechSynthesis) return;
  if (S.speaking) {
    window.speechSynthesis.cancel(); S.speaking=false;
    document.querySelectorAll('.tts-btn').forEach(b=>{b.classList.remove('speaking');b.textContent='🔊 읽어주기';});
    return;
  }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text.replace(/[^\uAC00-\uD7A3\u0020-\u007E\u00A0-\u024F]/g,''));
  utt.lang='ko-KR'; utt.rate=0.95; utt.pitch=1.05;
  const voices = window.speechSynthesis.getVoices();
  const ko = voices.find(v=>v.lang.startsWith('ko'));
  if(ko) utt.voice=ko;
  S.speaking=true;
  btn.classList.add('speaking'); btn.textContent='⏹ 멈추기';
  utt.onend=utt.onerror=()=>{ S.speaking=false; btn.classList.remove('speaking'); btn.textContent='🔊 읽어주기'; };
  window.speechSynthesis.speak(utt);
}

let demoStep = 0;

async function sendMiddleToAI(key, uid, aid, userMsg) {
  if (S.loading) return;
  S.loading = true;
  const snd = document.getElementById('snd_' + key);
  if (snd) snd.disabled = true;

  S.history[key].push({ role: 'user', content: userMsg });
  addBubble(key, 'user', userMsg.replace(/\n/g,'<br>'));
  showTyping(key);

  // 데모 모드: 스크립트에서 순서대로 응답
  await new Promise(r => setTimeout(r, 900));
  hideTyping(key);

  const script = DEMO_SCRIPT[demoStep] || DEMO_SCRIPT[DEMO_SCRIPT.length - 1];
  const reply = script.ai;
  addBubble(key, 'ai', reply.replace(/\n/g,'<br>'));
  S.history[key].push({ role: 'assistant', content: reply });
  demoStep = Math.min(demoStep + 1, DEMO_SCRIPT.length - 1);

  // 마지막 단계면 답안 자동 채우기 + 탭 안내
  if (demoStep === DEMO_SCRIPT.length - 1) {
    setTimeout(() => {
      const ta = document.getElementById('ans_' + key);
      if (ta && !ta.value) {
        ta.value = '소인수분해는 자연수를 소수들의 곱으로 나타내는 것입니다. 48 = 2×2×2×2×3 입니다.';
        updateCharCount(key);
        // 답안 탭으로 자동 전환
        switchPhase(2, key);
        // 안내 메시지
        setTimeout(() => {
          const hint = document.createElement('div');
          hint.style.cssText = 'padding:10px 16px;background:var(--accent-l);border:1px solid var(--accent-b);border-radius:8px;font-size:13px;color:var(--accent);margin-top:8px;';
          hint.innerHTML = '✦ <b>C 수준 예시 답안</b>이 자동으로 입력되었어요. "제출하고 피드백 받기" 버튼을 눌러보세요!';
          const editorCard = document.querySelector('.editor-card');
          if (editorCard) editorCard.parentNode.insertBefore(hint, editorCard.nextSibling);
        }, 300);
      }
    }, 600);
  }

  S.loading = false;
  if (snd) snd.disabled = false;
}

function elemDemoFill(key, idx) {
  const uid = key.replace('_a1','');
  const u = E_UNITS[uid];
  if (!u) return;
  const ta = document.getElementById('inp_' + key);
  if (ta) { ta.value = u.demoFillMsgs[idx] || ''; ta.focus(); }
}

async function elemSendMsg(key, uid) {
  const ta = document.getElementById('inp_' + key);
  const val = ta ? ta.value.trim() : '';
  if (!val || S.loading) return;
  if (ta) ta.value = '';
  S.loading = true;
  const snd = document.getElementById('snd_' + key);
  if (snd) snd.disabled = true;
  const u = E_UNITS[uid];
  S.history[key].push({ role: 'user', content: val });
  addBubble(key, 'user', val.replace(/\n/g,'<br>'));
  showTyping(key);
  await new Promise(r => setTimeout(r, 800));
  hideTyping(key);
  const step = elemDemoSteps[key] || 0;
  const script = u.demoScript[Math.min(step, u.demoScript.length-1)];
  addBubble(key, 'ai', script.ai);
  S.history[key].push({ role: 'assistant', content: script.ai });
  elemDemoSteps[key] = Math.min(step + 1, u.demoScript.length - 1);
  if (elemDemoSteps[key] === u.demoScript.length - 1) {
    setTimeout(() => switchPhase(2, key), 1000);
  }
  S.loading = false;
  if (snd) snd.disabled = false;
}

function submitElemAnswer(key, uid) {
  const ta = document.getElementById('ans_' + key);
  const ans = ta ? ta.value.trim() : '';
  if (!ans) { alert('답안을 먼저 작성해주세요.'); return; }
  switchPhase(3, key);
  const u = E_UNITS[uid];
  const fb = u.fbTemplate;
  const rubric = u.rubric4;
  const curIdx = rubric.findIndex(r => r.grade === fb.grade);
  const cur = rubric[curIdx];
  const target = curIdx > 0 ? rubric[curIdx-1] : null;
  const fbCard = document.getElementById('fb-card_' + key);
  let fbHtml = '<div class="feedback-header"><div class="grade-badge ' + cur.cls + '" style="font-size:11px;width:56px;height:56px;padding:4px">' + cur.grade + '</div><div class="grade-info"><h4>현재 답안은 <b>' + cur.grade + '</b> 수준이에요</h4><p>' + cur.summary + '</p></div></div>';
  fbHtml += '<div class="my-answer-preview"><div class="my-answer-label">내가 쓴 답안</div><div class="my-answer-text">' + ans.replace(/\n/g,'<br>') + '</div></div>';
  fbHtml += '<div class="fb-sections"><div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px">3영역 상세 피드백</div>';
  fb.areas.forEach(a => {
    fbHtml += '<div class="fb-section"><div class="fb-section-header"><span class="fb-section-icon">' + a.icon + '</span><span class="fb-section-title">' + a.title + '</span><span class="fb-section-score ' + a.scoreCls + '">' + a.score + '</span></div><div class="fb-section-body">' + a.text + '<div class="fb-next">' + a.next + '</div></div></div>';
  });
  fbHtml += '</div><div class="example-section"><div class="example-title">성취수준별 예시 답안 — 내가 놓친 것이 무엇인지 확인하세요</div><div class="grade-ladder">';
  rubric.forEach(r => {
    const isCur = r.grade === fb.grade, isTarget = target && r.grade === target.grade;
    fbHtml += '<div class="grade-row ' + (isCur?'current':'') + ' ' + (isTarget?'target':'') + ' ' + (isCur||isTarget?'open':'') + '" onclick="toggleGradeRow(this)">';
    fbHtml += '<div class="grade-row-header"><div class="grade-lbl ' + r.cls + '" style="font-size:9px;width:auto;padding:3px 8px;border-radius:5px">' + r.grade + '</div><div class="grade-row-title">' + r.summary + '</div>';
    if (isCur) fbHtml += '<span class="grade-row-badge badge-current">내 수준</span>';
    if (isTarget) fbHtml += '<span class="grade-row-badge badge-target">목표</span>';
    fbHtml += '</div><div class="grade-row-body">' + r.answer.replace(/\n/g,'<br>') + (r.missing?'<div class="grade-row-missing">' + r.missing + '</div>':'') + '</div></div>';
  });
  fbHtml += '</div></div><div class="rewrite-bar"><button class="rewrite-btn" onclick="switchPhase(2,\'' + key + '\')">✏️ 피드백 반영해서 다시 쓰기</button><button class="compare-btn" onclick="switchPhase(1,\'' + key + '\')">← AI 탐구로 돌아가기</button></div>';
  fbCard.innerHTML = fbHtml;
  const tab3 = document.getElementById('ptab_3_' + key);
  if (tab3) tab3.classList.add('done');
}

    social: '1. 인권 침해의 종류: 청소년 노동 인권 침해\n2. 침해받은 사람: 아르바이트 청소년 노동자\n3. 침해한 사람/기관: 고용주(사장)\n4. 인권 침해 상황: 최저임금 미지급, 폭언\n5. 구제 기관: 국가인권위원회(진정 접수·권고), 법원(근로기준법 위반 처벌)\n6. 역할극 등장인물: 알바생, 사장, 국가인권위원회 담당자, 판사'
  };
  const labels = {
    math: { color: 'var(--accent)', bg: 'var(--accent-l)', border: 'var(--accent-b)' },
    science: { color: 'var(--teal)', bg: 'var(--teal-l)', border: 'var(--teal-b)' },
    social: { color: 'var(--purple)', bg: 'var(--purple-l)', border: 'var(--purple-b)' }
  };
  const c = labels[subject];

  setTimeout(() => {
    const ta = document.getElementById('ans_' + key);
    if (ta && !ta.value) {
      ta.value = answers[subject];
      updateCharCount(key);
      switchPhase(2, key);
      setTimeout(() => {
        const hint = document.createElement('div');
        hint.style.cssText = `padding:10px 16px;background:${c.bg};border:1px solid ${c.border};border-radius:8px;font-size:13px;color:${c.color};margin-top:8px;`;
        hint.innerHTML = `✦ <b>C 수준 예시 답안</b>이 자동으로 입력되었어요. "제출하고 피드백 받기" 버튼을 눌러보세요!`;
        const editorCard = document.querySelector('.editor-card');
        if (editorCard) editorCard.parentNode.insertBefore(hint, editorCard.nextSibling);
      }, 300);
    }
  }, 600);
}

async function sendMiddleToAI(key, uid, aid, userMsg) {
  if (S.loading) return;
  S.loading = true;
  const snd = document.getElementById('snd_' + key);
  if (snd) snd.disabled = true;

  S.history[key].push({ role: 'user', content: userMsg });
  addBubble(key, 'user', userMsg.replace(/\n/g,'<br>'));
  showTyping(key);

  await new Promise(r => setTimeout(r, 900));
  hideTyping(key);

  const step = demoSteps.math;
  const script = DEMO_SCRIPT[step] || DEMO_SCRIPT[DEMO_SCRIPT.length - 1];
  const reply = script.ai;
  addBubble(key, 'ai', reply.replace(/\n/g,'<br>'));
  S.history[key].push({ role: 'assistant', content: reply });
  demoSteps.math = Math.min(step + 1, DEMO_SCRIPT.length - 1);

  if (demoSteps.math === DEMO_SCRIPT.length - 1) {
    autofillAndAdvance(key, 'math');
  }

  S.loading = false;
  if (snd) snd.disabled = false;
}

      </div>
    </div>

    <!-- PHASE 1 -->
    <div class="phase-panel on" id="pp1_${key}">
      <div class="chat-card">
        <div class="chat-header">
          <div class="chat-dot"></div>
          <div class="chat-hdr-txt">AI 튜터와 함께 인권 침해 사례를 분석해봐요</div>
        </div>
        <div class="chat-body" id="chat_${key}">
          <div class="bbl ai">
            <div class="bbl-lbl">AI 튜터</div>
            안녕하세요! <b>인권 침해와 역할극</b> 수행평가를 함께 준비해봐요 😊<br><br>
            먼저 생각해볼게요. 여러분이 직접 경험했거나 뉴스에서 봤던 <b>인권 침해 상황</b>이 있나요?<br>
            어떤 사례를 역할극 주제로 다루고 싶은지 이야기해줄 수 있어요?
          </div>
        </div>
        <div class="input-area">
          <div class="input-row">
            <textarea id="inp_${key}" placeholder="💬 데모: 아래 버튼을 순서대로 눌러보세요 → 전송 버튼 클릭!" onkeydown="hk(event,'${key}')"></textarea>
            <button class="mic-btn" id="mic_${key}" onclick="toggleMic('${key}')" title="음성으로 말하기">🎤</button>
            <button class="send-btn" id="snd_${key}" onclick="sendSubjectMsg('${key}','${unitId}','a1','social')" style="background:var(--purple)">전송 ›</button>
          </div>
          <div class="voice-status" id="vst_${key}"></div>
          <div class="pills">
            <button class="pill" style="background:var(--purple-l);color:var(--purple);border-color:var(--purple-b);font-weight:600" onclick="demoFillSubject('${key}','social',0)">① 청소년 알바 사례로!</button>
            <button class="pill" onclick="demoFillSubject('${key}','social',1)">② 당사자 파악했어요!</button>
            <button class="pill" onclick="demoFillSubject('${key}','social',2)">③ 임금+폭언 상황이요!</button>
            <button class="pill" onclick="demoFillSubject('${key}','social',3)">④ 인권위랑 법원이요!</button>
            <button class="pill" onclick="demoFillSubject('${key}','social',4)">⑤ 등장인물 정했어요!</button>
          </div>
        </div>
      </div>
      <div style="text-align:right">
        <button onclick="switchPhase(2,'${key}')" style="padding:9px 20px;background:var(--purple);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">탐구 완료 → 사례·대본 작성하기 ›</button>
      </div>
    </div>

    <!-- PHASE 2 -->
    <div class="phase-panel" id="pp2_${key}">
      <div class="editor-card">
        <div class="editor-header">
          <div class="editor-header-left">
            <div class="editor-title">✏️ 인권 침해 사례 & 역할극 대본 작성</div>
            <div class="editor-hint">AI 없이 혼자 써보는 구간 — 실제 수행평가와 동일한 조건</div>
          </div>
          <button class="hint-toggle" onclick="toggleConceptHint('${key}')">💡 개념 힌트</button>
        </div>
        <div id="concept-hint_${key}" style="display:none;padding:12px 18px;background:var(--purple-l);border-bottom:1px solid var(--purple-b);font-size:13px;color:#4c1d95;line-height:1.7">
          <b>국가기관 역할만 확인하세요</b><br>
          · 법원: 형사재판(처벌), 민사재판(손해배상)<br>
          · 헌법재판소: 위헌법률심판, 헌법소원심판<br>
          · 국가인권위원회: 진정 접수·조사·권고
        </div>
        <div class="editor-body">
          <textarea class="answer-textarea" id="ans_${key}"
            placeholder="아래 내용을 포함해서 작성해보세요:

1. 인권 침해의 종류:
2. 침해받은 사람:
3. 침해한 사람/기관:
4. 인권 침해 상황 (구체적으로):
5. 구제 기관 및 역할:
6. 역할극 대본 (등장인물, 배경, 대사):"
            oninput="updateCharCount('${key}')"></textarea>
        </div>
        <div class="editor-footer">
          <div class="char-count" id="cc_${key}">0자 작성 중</div>
          <button class="submit-btn" onclick="submitSubjectAnswer('${key}','${unitId}','social')" style="background:var(--purple)">제출하고 피드백 받기 →</button>
        </div>
      </div>
      <div style="text-align:left;margin-top:-6px">
        <button onclick="switchPhase(1,'${key}')" style="padding:7px 14px;background:transparent;border:1px solid var(--border2);border-radius:var(--r-sm);font-size:12px;color:var(--text2);font-family:inherit;cursor:pointer">← AI 탐구로 돌아가기</button>
      </div>
    </div>

    <!-- PHASE 3 -->
    <div class="phase-panel" id="pp3_${key}">
      <div class="feedback-card" id="fb-card_${key}">
        <div style="padding:40px;text-align:center;color:var(--text3);font-size:14px">
          📝 답안을 먼저 작성하고 제출하면 피드백이 나타납니다.
        </div>
      </div>
    </div>`;
}

// ── 과학·사회 공통 메시지 전송 ──
const SUBJECT_QUICK = {
  science: {
    props: '4가지 물질(철가루, 스타이로폼, 모래, 소금)의 특징을 각각 알려주세요.',
    methods: '각 물질의 특성을 이용하는 분리 방법이 어떤 것들이 있나요?',
    order: '분리 순서는 어떻게 정해야 하나요?',
    check: '제 실험 설계를 확인해주세요. 피드백 부탁해요.'
  },
  social: {
    case: '어떤 인권 침해 사례를 선정하면 좋을까요? 예시를 알려주세요.',
    org: '인권 침해를 구제하는 국가기관으로 어떤 것들이 있나요?',
    script: '역할극 대본을 어떻게 구성하면 좋을까요?',
    check: '제 사례 분석과 대본을 확인해주세요. 피드백 부탁해요.'
  }
};

function quickSubjectMsg(key, unitId, aid, subject, pillIdx) {
  const u = subject === 'science' ? S_UNITS[unitId] : SO_UNITS[unitId];
  const a = u.acts.find(x => x.id === aid);
  const pillKey = a.pillKeys[pillIdx];
  const msg = SUBJECT_QUICK[subject][pillKey] || '질문이 있어요.';
  sendSubjectMsg(key, unitId, aid, subject, msg);
}

function sendSubjectMsg(key, unitId, aid, subject, overrideMsg) {
  const ta = document.getElementById('inp_' + key);
  const val = overrideMsg || (ta ? ta.value.trim() : '');
  if (!val || S.loading) return;
  if (ta && !overrideMsg) ta.value = '';
  sendSubjectToAI(key, unitId, aid, subject, val);
}

async function sendSubjectToAI(key, unitId, aid, subject, userMsg) {
  if (S.loading) return;
  S.loading = true;
  const snd = document.getElementById('snd_' + key);
  if (snd) snd.disabled = true;

  const u = subject === 'science' ? S_UNITS[unitId] : SO_UNITS[unitId];
  const a = u.acts.find(x => x.id === aid);
  S.history[key].push({ role: 'user', content: userMsg });
  addBubble(key, 'user', userMsg.replace(/\n/g,'<br>'));
  showTyping(key);

  // ── 데모 모드 ──
  const scripts = subject === 'science' ? DEMO_SCRIPT_SCIENCE : DEMO_SCRIPT_SOCIAL;
  const stepKey = subject; // 'science' or 'social'
  const step = demoSteps[stepKey];

  await new Promise(r => setTimeout(r, 900));
  hideTyping(key);

  const entry = scripts[step] || scripts[scripts.length - 1];
  const reply = entry.ai;
  addBubble(key, 'ai', reply.replace(/\n/g,'<br>'));
  S.history[key].push({ role: 'assistant', content: reply });
  demoSteps[stepKey] = Math.min(step + 1, scripts.length - 1);

  if (demoSteps[stepKey] === scripts.length - 1) {
    autofillAndAdvance(key, subject);
  }

  S.loading = false;
  if (snd) snd.disabled = false;
}

// ── 과학·사회 답안 제출 및 피드백 ──
function submitSubjectAnswer(key, unitId, subject) {
  const ta = document.getElementById('ans_' + key);
  const ans = ta ? ta.value.trim() : '';
  if (!ans) { alert('답안을 먼저 작성해주세요.'); return; }
  switchPhase(3, key);

  const u = subject === 'science' ? S_UNITS[unitId] : SO_UNITS[unitId];
  const fb = u.fbTemplate;
  const rubric = u.rubric5;
  const accentColor = subject === 'science' ? 'var(--teal)' : 'var(--purple)';
  const accentL = subject === 'science' ? 'var(--teal-l)' : 'var(--purple-l)';
  const accentB = subject === 'science' ? 'var(--teal-b)' : 'var(--purple-b)';

  const cur = rubric.find(r => r.grade === fb.grade);
  const targetIdx = rubric.findIndex(r => r.grade === fb.grade) - 1;
  const target = targetIdx >= 0 ? rubric[targetIdx] : null;

  const fbCard = document.getElementById('fb-card_' + key);
  fbCard.innerHTML = `
    <div class="feedback-header">
      <div class="grade-badge ${cur.cls}">${cur.grade}</div>
      <div class="grade-info">
        <h4>현재 답안은 <b>${cur.grade} 수준</b>이에요</h4>
        <p>${cur.summary}</p>
      </div>
    </div>
    <div class="my-answer-preview">
      <div class="my-answer-label">내가 쓴 답안</div>
      <div class="my-answer-text">${ans.replace(/\n/g,'<br>')}</div>
    </div>
    <div class="fb-sections">
      <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px">3영역 상세 피드백</div>
      ${fb.areas.map(area => `
      <div class="fb-section">
        <div class="fb-section-header">
          <span class="fb-section-icon">${area.icon}</span>
          <span class="fb-section-title">${area.title}</span>
          <span class="fb-section-score ${area.scoreCls}">${area.score}</span>
        </div>
        <div class="fb-section-body">
          ${area.text}
          <div class="fb-next" style="background:${accentL};border-left-color:${accentColor};color:${accentColor}">${area.next}</div>
        </div>
      </div>`).join('')}
    </div>
    <div class="example-section">
      <div class="example-title">등급별 예시 답안 — 내가 놓친 것이 무엇인지 확인하세요</div>
      <div class="grade-ladder">
        ${rubric.map(r => {
          const isCur = r.grade === fb.grade;
          const isTarget = target && r.grade === target.grade;
          return `<div class="grade-row ${isCur?'current':''} ${isTarget?'target':''} ${isCur||isTarget?'open':''}" onclick="toggleGradeRow(this)">
            <div class="grade-row-header">
              <div class="grade-lbl ${r.cls}">${r.grade}</div>
              <div class="grade-row-title">${r.summary}</div>
              ${isCur?'<span class="grade-row-badge badge-current">내 수준</span>':''}
              ${isTarget?'<span class="grade-row-badge badge-target">목표</span>':''}
            </div>
            <div class="grade-row-body">
              ${r.answer.replace(/\n/g,'<br>')}
              ${r.missing ? `<div class="grade-row-missing" style="background:${accentL};border-left-color:${accentColor};color:${accentColor}">${r.missing}</div>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="rewrite-bar">
      <button class="rewrite-btn" onclick="switchPhase(2,'${key}')" style="background:${accentColor}">✏️ 피드백 반영해서 다시 쓰기</button>
      <button class="compare-btn" onclick="switchPhase(1,'${key}')">← AI 탐구로 돌아가기</button>
    </div>`;

  const tab3 = document.getElementById('ptab_3_' + key);
  if (tab3) tab3.classList.add('done');
}

// 초기 subject 설정
S.subject = 'math';
</script>
</body>
